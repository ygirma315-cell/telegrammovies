name: Keep Render Awake

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/keepalive.yml
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        env:
          HEALTH_URL: https://telegrammovies.onrender.com/health
        run: |
          for attempt in 1 2 3; do
            echo "Wake attempt ${attempt}"
            code=$(curl -L -sS -o /tmp/health.json -w "%{http_code}" --max-time 80 "${HEALTH_URL}?source=github-actions&attempt=${attempt}&t=$(date +%s)" || true)
            cat /tmp/health.json || true
            echo
            echo "HTTP ${code}"
            if [ "${code}" -ge 200 ] && [ "${code}" -lt 300 ]; then
              exit 0
            fi
            sleep 20
          done
          exit 1
