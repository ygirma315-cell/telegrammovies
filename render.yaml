services:
  - type: web
    name: telegrammovies
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        value: moviesstorehdbot
      - key: TELEGRAM_INDEX_CHANNEL_ID
        value: "-1003522601621"
      - key: APP_SESSION_DIR
        value: /tmp/telegrammovies-sessions
      - key: CATALOG_SEED_FILE
        value: data/stored_movies.json
      - key: PUBLIC_BOT_ONLY
        value: "true"
      - key: ADMIN_PASSWORD
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_WEBHOOK_PATH
        value: /telegram/webhook
      - key: AUTO_SET_WEBHOOK
        value: "true"
      - key: BOT_MAX_FILES_PER_REQUEST
        value: "3"
